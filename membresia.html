<!DOCTYPE html>
<html>

<head>
<title>Membresía</title>

<style>
/* ----------- ESTILO GENERAL ----------- */
body{
margin:0;
font-family:Arial;
background:#0d0d0d;

}

/* ----------- HERO ----------- */
.hero{

background-size:cover;
background-position:center;
padding:120px 20px;

}

.hero::after{
content:"";

left:0;
right:0;
bottom:0;

}

.hero-content{
position:relative;
z-index:2;
}

.hero h1{
font-size:48px;

}

.hero button{
padding:14px 30px;
font-size:18px;

border-radius:8px;
color:white;

}

/* ----------- SECCIONES ----------- */
.seccion{
padding:60px 20px;
}

/* ----------- PRECIOS ----------- */
.precios{

justify-content:center;

}

.tarjeta{

padding:30px;

}

}

/* ----------- PASOS ----------- */
.pasos{

.paso{
background:#1a1a2e;
padding:22px;
border-radius:12px;
width:240px;
text-align:left;
}

.paso h3{
color:#00d4ff;
}

.paso input{
width:90%;
padding:10px;
margin-bottom:10px;
border:none;
border-radius:6px;
background:#2b2b3e;
color:white;
}

/* ----------- BOTONES ----------- */
.verpass{
width:95%;
padding:8px;
margin-bottom:10px;
background:#444;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

.paso button{
width:95%;
padding:12px;
background:#4f46e5;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.whatsapp{
background:#00d4ff;
color:#121212;
}

/* ----------- PASO 4 DESTACADO ----------- */
.paso-login{
border:2px solid ;
background:transparent;
padding:30px;
border-radius:12px;
text-align:center;
width:260px;
color:white;
}

.paso-login h3{

margin-bottom:20px;
}

.paso-login button{
width:100%;
padding:18px;
font-size:20px;
background:#4f46e5;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

.paso-login button:hover{
background:#14b8a6;
transform:scale(1.03);
}
</style>

</head>

<body>

<!-- HERO -->
<div class="hero">
<div class="hero-content">
<h1>1 Habilidad x 1 Café</h1>

</div>

<!-- PLANES -->
<div class="seccion">

<div class="tarjeta">

</div>
<div class="tarjeta">

<div class="precio">$18000</div>
</div>
</div>
</div>

<!-- PASOS -->
<div class="seccion">
<div class="pasos">

<!-- PASO 1 -->
<div class="paso">
<h3>1 Crear cuenta</h3>
<input type="email" id="email" placeholder="Tu correo">
<input type="password" id="password" placeholder="Contraseña">
<button class="verpass" id="verpass">Mostrar contraseña</button>
<button id="crearCuenta">Crear cuenta</button>
<p id="mensaje"></p>
</div>

<!-- PASO 2 -->
<div class="paso">
<h3>2 Realizar pago</h3>
<p>
Alias: melisa.f.<br>
Titular: Melisa Fernández<br>
wsp: (+54) 343 5508780
</p>
</div>

<!-- PASO 3 -->
<div class="paso">
<h3>3 Enviar comprobante</h3>
<button class="whatsapp" onclick="window.open('https://wa.me/543435508780')">Enviar comprobante</button>
</div>

<!-- PASO 4 -->
<div class="paso-login">
<h3>4 Acceder</h3>
<a href="login.html"><button>Ingresar a la plataforma</button></a>
</div>

</div>
</div>

<script type="module">

/* ----------- FIREBASE ----------- */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey:"AIzaSyBFJH3LRuaS8yc6iDsXXcwACzpddA8lr5c",
authDomain:"habilidadx1cafe.firebaseapp.com",
projectId:"habilidadx1cafe",
storageBucket:"habilidadx1cafe.firebasestorage.app",
messagingSenderId:"113035104487",
appId:"1:113035104487:web:1427b58f5263136d321242"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* ----------- ELEMENTOS ----------- */
const emailInput = document.getElementById("email");
const passInput = document.getElementById("password");
const mensaje = document.getElementById("mensaje");

/* ----------- MOSTRAR PASSWORD ----------- */
document.getElementById("verpass").addEventListener("click", function(){
  passInput.type = (passInput.type === "password") ? "text" : "password";
});

/* ----------- CREAR CUENTA ----------- */
document.getElementById("crearCuenta").addEventListener("click", function(){
  let email = emailInput.value;
  let password = passInput.value;

  if(!email || !password){
    mensaje.innerText = "Completa email y contraseña";
    return;
  }
  if(password.length < 6){
    mensaje.innerText = "La contraseña debe tener mínimo 6 caracteres";
    return;
  }

  createUserWithEmailAndPassword(auth,email,password)
  .then(()=>{
    // ✅ Guardar email en Google Sheet
    fetch("https://script.google.com/macros/s/AKfycbwkm04yFGkhgn3skh33f5wdoR6j8WxOptz648CJ9iDMPAPUtn7ST58WI3OGT8EZwWem/exec", {
      method: "POST",
      headers: {"Content-Type":"application/x-www-form-urlencoded"},
      body: `email=${encodeURIComponent(email)}`
    })
    .then(res=>res.json())
    .then(data=>console.log("Sheet:", data))
    .catch(err=>console.log(err));

    mensaje.innerText = "Cuenta creada. Ahora envía el comprobante.";
  })
  .catch(error=>{
    mensaje.innerText = error.message;
  });
});
</script>

</body>
</html>

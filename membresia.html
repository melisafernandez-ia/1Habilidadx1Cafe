<!DOCTYPE html>
<html>

<head>

<title>Membresía</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
background:#0f0f0f;
text-align:center;
}

.hero{
position:relative;
width:100%;
height:350px;
overflow:hidden;
}

.hero img{
width:100%;
height:100%;
object-fit:cover;
filter:brightness(0.4);
}

.hero-texto{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.hero-texto h1{
font-size:48px;
color:#00d4ff;
margin:0;
}

.hero-texto p{
font-size:22px;
margin-top:10px;
}

.seccion{
padding:60px 20px;
}

.precios{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
}

.tarjeta{
background:#1f1f1f;
padding:30px;
border-radius:12px;
width:260px;
border:2px solid #00d4ff;
}

.precio{
font-size:32px;
color:#00d4ff;
margin-top:10px;
}

.pasos{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
}

.paso{
background:#1a1a1a;
padding:25px;
border-radius:12px;
width:250px;
border:2px solid #00d4ff;
}

.paso h3{
color:#00d4ff;
}

input{
width:90%;
padding:10px;
margin-bottom:10px;
border:none;
border-radius:6px;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
background:#00d4ff;
cursor:pointer;
font-weight:bold;
}

button:hover{
opacity:0.9;
}

.verpass{
background:#444;
color:white;
margin-bottom:10px;
}

.whatsapp{
background:#444;
color:white;
}

</style>

</head>

<body>


<div class="hero">

<img src="https://images.unsplash.com/photo-1518770660439-4636190af475">

<div class="hero-texto">
<h1>1 Habilidad x 1 Café</h1>
<p>Inteligencia Artificial para docentes</p>
</div>

</div>


<div class="seccion">

<h2>Planes</h2>

<div class="precios">

<div class="tarjeta">
<h3>Clase en vivo</h3>
<div class="precio">$5000</div>
</div>

<div class="tarjeta">
<h3>Membresía mensual</h3>
<div class="precio">$15000</div>
</div>

</div>
</div>


<div class="seccion">

<h2>Cómo acceder</h2>

<div class="pasos">


<div class="paso">

<h3>1 Crear cuenta</h3>

<input id="email" type="email" placeholder="Tu email">

<input id="password" type="password" placeholder="Contraseña">

<button type="button" class="verpass" id="verpass">
Mostrar contraseña
</button>

<button type="button" id="crearCuenta">
Crear cuenta
</button>

<p id="mensaje"></p>

</div>


<div class="paso">

<h3>2 Realizar pago</h3>

<p>
Alias: melisa.f<br>
Titular: Melisa Fernández<br>
wsp: (+54) 343 5508780
</p>

</div>


<div class="paso">

<h3>3 Enviar comprobante</h3>

<button type="button" class="whatsapp"
onclick="window.open('https://wa.me/543435508780')">
Enviar comprobante
</button>

</div>


<div class="paso">

<h3>4 Acceder</h3>

<a href="login.html">
<button type="button">
Ingresar a la plataforma
</button>
</a>

</div>

</div>
</div>


<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


const firebaseConfig = {

apiKey:"AIzaSyBFJH3LRuaS8yc6iDsXXcwACzpddA8lr5c",
authDomain:"habilidadx1cafe.firebaseapp.com",
projectId:"habilidadx1cafe",
storageBucket:"habilidadx1cafe.firebasestorage.app",
messagingSenderId:"113035104487",
appId:"1:113035104487:web:1427b58f5263136d321242"

};


const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const emailInput = document.getElementById("email");
const passInput = document.getElementById("password");
const mensaje = document.getElementById("mensaje");


document.getElementById("verpass").addEventListener("click",function(){

if(passInput.type==="password"){
passInput.type="text";
}else{
passInput.type="password";
}

});


document.getElementById("crearCuenta").addEventListener("click",function(){

let email=emailInput.value;
let password=passInput.value;

if(email==="" || password===""){
mensaje.innerText="Completa email y contraseña";
return;
}

if(password.length<6){
mensaje.innerText="La contraseña debe tener mínimo 6 caracteres";
return;
}

createUserWithEmailAndPassword(auth,email,password)

.then(()=>{

guardarUsuario(email);

mensaje.innerText="Cuenta creada. Ahora envía el comprobante.";

})

.catch(error=>{
mensaje.innerText=error.message;
});

});


function guardarUsuario(email){

fetch("https://sheetdb.io/api/v1/i8l8o8fhonpzj", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
data: [{
email: email,
fecha_creacion: new Date().toLocaleDateString(),
vence: "",
estado: "pendiente"
}]
})
})
.then(res => res.json())
.then(data => console.log("Guardado en Sheet:", data))
.catch(err => console.log("Error:", err));

}

</script>

</body>
</html>

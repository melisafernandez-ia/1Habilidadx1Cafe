
<!DOCTYPE html>
<html>

<head>

<title>Ingreso a la plataforma</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ---------- ESTILO GENERAL ---------- */

body{
margin:0;
font-family:Arial;
color:white;

background-image:url("https://images.unsplash.com/photo-1519389950473-47ba0277781c");
background-size:cover;
background-position:center;

min-height:100vh;
}

/* ---------- OSCURECER FONDO ---------- */

.overlay{
min-height:100vh;
background:rgba(0,0,0,0.65);

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

padding:40px 20px;
box-sizing:border-box;
}

/* ---------- TITULO ---------- */

.titulo{
font-size:40px;
font-weight:bold;
margin-bottom:8px;
text-align:center;
}

.subtitulo{
color:#ccc;
margin-bottom:35px;
text-align:center;
max-width:400px;
}

/* ---------- CAJA LOGIN ---------- */

.login-box{

background:#1c1c1c;
padding:40px;
border-radius:14px;

width:340px;
max-width:100%;

text-align:center;

box-shadow:0 0 25px rgba(0,0,0,0.7);

}

/* ---------- INPUTS ---------- */

.input-container{
position:relative;
}

input{

width:100%;
padding:14px;
margin:10px 0;

border:none;
border-radius:8px;

background:#2b2b2b;
color:white;
font-size:16px;
box-sizing:border-box;
}

input::placeholder{
color:#aaa;
}

/* ---------- OJITO CONTRASEÑA ---------- */

.toggle-pass{

position:absolute;
right:15px;
top:50%;
transform:translateY(-50%);

cursor:pointer;
font-size:18px;
}

/* ---------- BOTONES ---------- */

button{

padding:14px;
margin-top:10px;

background:#ff4b2b;
color:white;

border:none;
border-radius:8px;

cursor:pointer;
font-size:16px;

width:100%;
}

button:hover{
background:#ff2a00;
}

/* ---------- LINKS ---------- */

.link{
color:#25D366;
display:block;
margin-top:15px;
cursor:pointer;
}

/* ---------- MEMBRESIA ---------- */

.membresia{

margin-top:25px;
padding-top:20px;

border-top:1px solid #333;
}

.membresia button{
background:#25D366;
}

.membresia button:hover{
background:#1ebe5b;
}

/* ---------- WHATSAPP ---------- */

.ayuda{
margin-top:20px;
}

.ayuda a{
color:#25D366;
text-decoration:none;
}

/* ---------- FOOTER ---------- */

footer{
margin-top:40px;
font-size:14px;
color:#aaa;
text-align:center;
}

/* ---------- CELULAR ---------- */

@media(max-width:600px){

.titulo{
font-size:30px;
}

.subtitulo{
font-size:16px;
margin-bottom:25px;
}

.login-box{
padding:28px;
}

}

</style>

</head>

<body>

<div class="overlay">

<div class="titulo">
1 Habilidad x 1 Café
</div>

<div class="subtitulo">
Plataforma de clases y recursos con IA para docentes
</div>

<div class="login-box">

<input
type="email"
id="email"
placeholder="Tu email">

<div class="input-container">

<input
type="password"
id="password"
placeholder="Tu contraseña">

<span
class="toggle-pass"
onclick="togglePassword()">
👁
</span>

</div>

<button id="btnLogin" onclick="login()">
Ingresar
</button>

<a
class="link"
onclick="resetPassword()">
¿Olvidaste tu contraseña?
</a>

<div class="membresia">

<p style="color:#ccc;">
¿Aún no tienes acceso?
</p>

<a href="membresia.html">
<button>
Ver membresía
</button>
</a>

</div>

<div class="ayuda">
<a href="https://wa.me/543435508780" target="_blank">
¿Necesitas ayuda? Escríbeme por WhatsApp
</a>
</div>

</div>

<footer>
© 2026 Melisa Fernández — IA para docentes
</footer>

</div>

<script type="module">

/* ---------- FIREBASE ---------- */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
sendPasswordResetEmail
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyBFJH3LRuaS8yc6iDsXXcwACzpddA8lr5c",
authDomain: "habilidadx1cafe.firebaseapp.com",
projectId: "habilidadx1cafe",
storageBucket: "habilidadx1cafe.firebasestorage.app",
messagingSenderId: "113035104487",
appId: "1:113035104487:web:1427b58f5263136d321242"

};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* ---------- API GOOGLE SHEET ---------- */

const API_URL =
"https://script.google.com/macros/s/AKfycbybDXMPiZyDtzkYmvotmf1RUeWsG_XIz7ba6EVq8GYnbLDOE9WcdaI-HLSgNvrrKK5k/exec";

/* ---------- LOGIN ---------- */

window.login = async function(){

const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value;
const btn = document.getElementById("btnLogin");

if(email === "" || password === ""){
alert("Completa email y contraseña");
return;
}

btn.innerText="Ingresando...";
btn.disabled=true;

try{

const res = await fetch(API_URL,{
method:"POST",
body:JSON.stringify({email:email})
});

const data = await res.json();

/* NO REGISTRADO */

if(data.estado === "no_registrado"){
alert("Este email no está registrado. Primero debes adquirir la membresía.");
btn.innerText="Ingresar";
btn.disabled=false;
return;
}

/* PAGO PENDIENTE */

if(data.estado === "pendiente"){
alert(
"Aún no se registró el pago.\n\n"+
"El proceso puede demorar hasta 12 horas.\n\n"+
"Si ya pagaste envía el comprobante por WhatsApp."
);
btn.innerText="Ingresar";
btn.disabled=false;
return;
}

/* USUARIO ACTIVO */

if(data.estado === "activo"){

await signInWithEmailAndPassword(auth,email,password);

window.location.href="clases.html";

}

}

catch(error){

console.error(error);

alert("Error al iniciar sesión.");

btn.innerText="Ingresar";
btn.disabled=false;

}

}

/* ---------- MOSTRAR PASSWORD ---------- */

window.togglePassword = function(){

const pass = document.getElementById("password");

if(pass.type === "password"){
pass.type="text";
}
else{
pass.type="password";
}

}

/* ---------- RESET PASSWORD ---------- */

window.resetPassword = function(){

const email = document.getElementById("email").value.trim();

if(email===""){
alert("Escribe tu email primero");
return;
}

sendPasswordResetEmail(auth,email)

.then(()=>{
alert("Te enviamos un email para recuperar tu contraseña");
});

}

</script>

</body>
</html>

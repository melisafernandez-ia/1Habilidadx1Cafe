<!DOCTYPE html>
<html>

<head>

<title>Biblioteca de Clases</title>

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
text-align:center;
padding:40px;
}

/* BARRA USUARIO */

.barra-usuario{
display:flex;
justify-content:space-between;
align-items:center;
background:#1c1c1c;
padding:15px 25px;
border-radius:10px;
margin-bottom:40px;
}

.barra-usuario span{
font-size:16px;
color:#ddd;
}

.barra-usuario button{
background:#ff4b2b;
color:white;
border:none;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
}

.barra-usuario button:hover{
background:#ff2a00;
}

/* PORTADA */

.hero{
height:220px;
margin-bottom:60px;
border-radius:15px;
overflow:hidden;
box-shadow:0 0 30px rgba(0,0,0,0.8);
}

.hero img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

/* CONTENEDOR CLASES */

.contenedor{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:30px;
}

/* TARJETAS */

.clase{
background:#1c1c1c;
width:300px;
padding:25px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,0.6);
transition:transform 0.3s;
}

.clase:hover{
transform:scale(1.05);
}

.clase img{
width:100%;
border-radius:10px;
margin-bottom:10px;
}

/* BOTONES */

button{
padding:12px 25px;
font-size:16px;
background:#ff4b2b;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#ff2a00;
}

/* RESPONSIVE */

@media (max-width:768px){

body{
padding:20px;
}

.clase{
width:90%;
}

}

</style>

</head>

<body>

<div class="barra-usuario">

<span id="usuario"></span>

<button onclick="logout()">Cerrar sesión</button>

</div>

<div class="hero">
<img src="portada3.jpeg" alt="Portada">
</div>

<h2>Biblioteca de Clases</h2>

<div class="contenedor">

<div class="clase">
<img src="clase1.jpeg">
<h3>Clase 1</h3>
<p>Introducción a IA para docentes</p>
<a href="clase1.html">
<button>Ver clase</button>
</a>
</div>

<div class="clase">
<img src="clase2.jpeg">
<h3>Clase 2</h3>
<p>Crear evaluaciones con IA</p>
<a href="clase2.html">
<button>Ver clase</button>
</a>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBFJH3LRuaS8yc6iDsXXcwACzpddA8lr5c",
authDomain: "habilidadx1cafe.firebaseapp.com",
projectId: "habilidadx1cafe",
storageBucket: "habilidadx1cafe.firebasestorage.app",
messagingSenderId: "113035104487",
appId: "1:113035104487:web:1427b58f5263136d321242",
measurementId: "G-KTCF00V3VC"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth,(user)=>{

if(user){
document.getElementById("usuario").innerText = "Bienvenido: " + user.email;
}else{
window.location.href="login.html";
}

});

window.logout = function(){
signOut(auth).then(()=>{
window.location.href="login.html";
});
}

</script>

</body>
</html>

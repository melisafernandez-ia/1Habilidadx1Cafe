<!DOCTYPE html>
<html>

<head>
<title>Biblioteca de Clases</title>

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
text-align:center;
padding:40px;
}

.barra-usuario{
display:flex;
justify-content:space-between;
align-items:center;
background:#1c1c1c;
padding:15px 25px;
border-radius:10px;
margin-bottom:40px;
}

.barra-usuario button{
background:#ff4b2b;
color:white;
border:none;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
}

.hero{
height:220px;
margin-bottom:60px;
border-radius:15px;
overflow:hidden;
}

.hero img{
width:100%;
height:100%;
object-fit:cover;
}

.contenedor{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:30px;
}

.clase{
background:#1c1c1c;
width:300px;
padding:25px;
border-radius:12px;
}

button{
padding:12px 25px;
font-size:16px;
background:#ff4b2b;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

</style>

</head>

<body>

<div class="barra-usuario">
<span id="usuario"></span>
<button onclick="logout()">Cerrar sesión</button>
</div>

<div class="hero">
<img src="portada3.jpeg">
</div>

<h2>Biblioteca de Clases</h2>

<div class="contenedor">

<div class="clase">
<img src="clase1.jpeg">
<h3>Clase 1</h3>
<p>Introducción a IA para docentes</p>
<a href="clase1.html"><button>Ver clase</button></a>
</div>

<div class="clase">
<img src="clase2.jpeg">

<p>Crear evaluaciones con IA</p>
<a href="clase2.html"><button>Ver clase</button></a>

</div>

<script type="module">

const firebaseConfig = {

authDomain: "habilidadx1cafe.firebaseapp.com",
projectId: "habilidadx1cafe",
storageBucket: "habilidadx1cafe.firebasestorage.app",
messagingSenderId: "113035104487",
appId: "1:113035104487:web:1427b58f5263136d321242",
measurementId: "G-KTCF00V3VC"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* LISTA DE USUARIOS AUTORIZADOS */

"melisa.fernandez@uner.edu.ar",
"alumno1@gmail.com",

onAuthStateChanged(auth,(user)=>{

signOut(auth);

}

document.getElementById("usuario").innerText =

}else{

window.location.href="login.html";

}

});

window.logout = function(){
signOut(auth).then(()=>{
window.location.href="login.html";
});
}

</script>

</body>
</html>

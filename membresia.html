<script type="module">

/* ----------- FIREBASE ----------- */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey:"AIzaSyBFJH3LRuaS8yc6iDsXXcwACzpddA8lr5c",

projectId:"habilidadx1cafe",
storageBucket:"habilidadx1cafe.firebasestorage.app",
messagingSenderId:"113035104487",
appId:"1:113035104487:web:1427b58f5263136d321242"

};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* ----------- ELEMENTOS ----------- */

const emailInput = document.getElementById("email");
const passInput = document.getElementById("password");
const mensaje = document.getElementById("mensaje");

/* ----------- MOSTRAR PASSWORD ----------- */

document.getElementById("verpass").addEventListener("click",function(){

if(passInput.type==="password"){
passInput.type="text";
}
else{
passInput.type="password";
}

});

/* ----------- CREAR CUENTA ----------- */

document.getElementById("crearCuenta").addEventListener("click",function(){

let email=emailInput.value;
let password=passInput.value;

if(email==="" || password===""){

mensaje.innerText="Completa email y contraseña";
return;

}

if(password.length<6){

mensaje.innerText="La contraseña debe tener mínimo 6 caracteres";
return;

}

createUserWithEmailAndPassword(auth,email,password)

.then(()=>{

/* ENVIA EMAIL A GOOGLE SHEET */

fetch("https://script.google.com/macros/s/AKfycbwOm-F3IdTUBDg5JavYXV5pTN4NsT4-qYMoS8LggZLNEIKV4sRqIJ0UvZa5vBx78HIx/exec",{

method:"POST",
body:JSON.stringify({email:email})

});

mensaje.innerText="Cuenta creada. Ahora envía el comprobante.";

})

.catch(error=>{

mensaje.innerText=error.message;

});

});

</script>

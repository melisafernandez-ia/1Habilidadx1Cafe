<!DOCTYPE html>
<html>

<head>

<title>Login</title>

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:#1c1c1c;
padding:40px;
border-radius:10px;
width:300px;
text-align:center;
}

input{
width:90%;
padding:12px;
margin:10px 0;
border:none;
border-radius:6px;
}

button{
padding:12px 25px;
background:#ff4b2b;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#ff2a00;
}

a{
color:#25D366;
display:block;
margin-top:15px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Ingreso a las clases</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Contraseña">

<br>

<button onclick="login()">
Ingresar
</button>

<a onclick="resetPassword()">
¿Olvidaste tu contraseña?
</a>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { 
getAuth,
signInWithEmailAndPassword,
sendPasswordResetEmail
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


const firebaseConfig = {

apiKey: "AIzaSyBFJH3LRuaS8yc6iDsXXcwACzpddA8lr5c",
authDomain: "habilidadx1cafe.firebaseapp.com",
projectId: "habilidadx1cafe",
storageBucket: "habilidadx1cafe.firebasestorage.app",
messagingSenderId: "113035104487",
appId: "1:113035104487:web:1427b58f5263136d321242",
measurementId: "G-KTCF00V3VC"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

window.login = function(){

const email = document.getElementById("email").value;

const password = document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,password)

.then(() => {

window.location.href="clases.html"

})

.catch(() => {

alert("Email o contraseña incorrectos")

});

}


window.resetPassword = function(){

const email = document.getElementById("email").value;

if(email===""){

alert("Escribe tu email primero")

return

}

sendPasswordResetEmail(auth,email)

.then(()=>{

alert("Te enviamos un email para recuperar tu contraseña")

})

}

</script>

</body>

</html>

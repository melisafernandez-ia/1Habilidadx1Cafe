<!DOCTYPE html>
<html>

<head>

<title>Membresía</title>

<style>

body{
font-family: Arial;
background:#0f0f0f;
color:white;
text-align:center;
padding:60px;
}

h1{
font-size:42px;
margin-bottom:40px;
}

/* CONTENEDOR DE PRECIOS */

.precios{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
margin-bottom:40px;
}

/* TARJETAS */

.tarjeta{
background:#1c1c1c;
padding:30px;
border-radius:12px;
width:260px;
box-shadow:0 0 15px rgba(0,0,0,0.6);
}

.tarjeta h2{
margin-bottom:10px;
}

.precio{
font-size:36px;
margin:10px 0;
}

/* TARJETA DESTACADA */

.destacada{
border:2px solid #ff4b2b;
transform:scale(1.05);
}

/* ALIAS */

.alias{
background:#1c1c1c;
padding:25px;
border-radius:10px;
max-width:500px;
margin:auto;
margin-top:20px;
font-size:20px;
}

/* BOTONES */

button{
margin-top:25px;
padding:15px 30px;
font-size:18px;
background:#ff4b2b;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#ff2a00;
}

.whatsapp{
background:#25D366;
}

.whatsapp:hover{
background:#1ebe5b;
}

</style>

</head>

<body>

<h1>Accede a las clases</h1>

<div class="tarjeta">

<div class="precio">$5000</div>

</div>

</div>

<div class="alias">

<p><b>Pagar por transferencia</b></p>

Alias: <b>melisa.f.</b><br>
Titular: <b>Melisa Fernández</b><br>
Cuenta: Mercado Pago

</div>

<p style="margin-top:30px;">
Luego envía el comprobante por WhatsApp
</p>

<a href="https://wa.me/543435508780">

</html>

<!DOCTYPE html>
<html>

<head>

<title>Ingreso a las clases</title>

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
text-align:center;
padding:60px;
}

h1{
margin-bottom:20px;
}

.contenedor{
background:#1c1c1c;
padding:40px;
border-radius:12px;
max-width:400px;
margin:auto;
}

input{
width:90%;
padding:12px;
margin:10px;
border-radius:8px;
border:none;
font-size:16px;
}

button{
padding:14px 28px;
font-size:18px;
background:#ff4b2b;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#ff2a00;
}

</style>

</head>

<body>

<h1>Ingreso a la biblioteca</h1>

<p>Ingresa con el email autorizado para acceder a las clases</p>

<div class="contenedor">

<input id="email" type="email" placeholder="Email">

<input id="password" type="password" placeholder="Contraseña">

<br>

<button onclick="login()">Ingresar</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBFJH3LRuaS8yc6iDsXXcwACzpddA8lr5c",
authDomain: "habilidadx1cafe.firebaseapp.com",
projectId: "habilidadx1cafe",
storageBucket: "habilidadx1cafe.firebasestorage.app",
messagingSenderId: "113035104487",
appId: "1:113035104487:web:1427b58f5263136d321242",
measurementId: "G-KTCF00V3VC"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function(){

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,password)

.then((userCredential)=>{

window.location="clases.html";

})

.catch((error)=>{

alert("Email o contraseña incorrectos");

});

}

</script>

</body>

</html>

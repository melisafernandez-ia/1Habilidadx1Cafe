<!DOCTYPE html>
<html>

<head>

<title>Ingreso a la plataforma</title>

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.login-box{
background:#1c1c1c;
padding:40px;
border-radius:12px;
width:340px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,0.6);
}

h2{
margin-bottom:25px;
}

input{
width:90%;
padding:14px;
margin:10px 0;
border:none;
border-radius:8px;
background:#2b2b2b;
color:white;
font-size:15px;
}

input::placeholder{
color:#aaa;
}

button{
padding:12px 25px;
margin-top:10px;
background:#ff4b2b;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#ff2a00;
}

.link{
color:#25D366;
display:block;
margin-top:15px;
cursor:pointer;
}

.membresia{
margin-top:25px;
padding-top:20px;
border-top:1px solid #333;
}

.membresia button{
background:#25D366;
}

.membresia button:hover{
background:#1ebe5b;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Ingreso a las clases</h2>

<input type="email" id="email" placeholder="Tu email">

<input type="password" id="password" placeholder="Tu contraseña">

<br>

<button onclick="login()">
Ingresar
</button>

<a class="link" onclick="resetPassword()">
¿Olvidaste tu contraseña?
</a>

<div class="membresia">

<p style="color:#ccc;">
¿Aún no tienes acceso?
</p>

<a href="membresia.html">
<button>
Ver membresía
</button>
</a>

</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { 
getAuth,
signInWithEmailAndPassword,
sendPasswordResetEmail
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


const firebaseConfig = {

apiKey: "AIzaSyBFJH3LRuaS8yc6iDsXXcwACzpddA8lr5c",
authDomain: "habilidadx1cafe.firebaseapp.com",
projectId: "habilidadx1cafe",
storageBucket: "habilidadx1cafe.firebasestorage.app",
messagingSenderId: "113035104487",
appId: "1:113035104487:web:1427b58f5263136d321242",
measurementId: "G-KTCF00V3VC"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

window.login = function(){

const email = document.getElementById("email").value;

const password = document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,password)

.then(() => {

window.location.href="clases.html"

})

.catch((error) => {

if(error.code === "auth/user-not-found"){
alert("No existe una cuenta con ese email. Primero debes crear tu cuenta en la membresía.");
}

else if(error.code === "auth/wrong-password"){
alert("Contraseña incorrecta.");
}

else if(error.code === "auth/invalid-email"){
alert("El email no es válido.");
}

else{
alert("Tu acceso aún no fue activado. Si ya pagaste la membresía envía el comprobante por WhatsApp.");
}

});

}


window.resetPassword = function(){

const email = document.getElementById("email").value;

if(email===""){

alert("Escribe tu email primero")

return

}

sendPasswordResetEmail(auth,email)

.then(()=>{

alert("Te enviamos un email para recuperar tu contraseña")

})

}

</script>

</body>

</html>

<!DOCTYPE html>
<html>

<head>

<title>Ingreso a la plataforma</title>

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
text-align:center;
padding:60px;
}

h1{
font-size:40px;
margin-bottom:20px;
}

p{
color:#cccccc;
margin-bottom:30px;
}

.contenedor{
background:#1c1c1c;
padding:40px;
border-radius:12px;
max-width:400px;
margin:auto;
box-shadow:0 0 20px rgba(0,0,0,0.6);
}

input{
width:90%;
padding:12px;
margin-top:10px;
margin-bottom:20px;
border-radius:8px;
border:none;
font-size:16px;
}

button{
padding:14px 28px;
font-size:18px;
background:#ff4b2b;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#ff2a00;
}

</style>

</head>

<body>

<h1>Ingreso a las clases</h1>

<p>
Si ya enviaste tu comprobante por WhatsApp,<br>
ingresa tu email para acceder a la biblioteca de clases.
</p>

<div class="contenedor">

<input type="email" placeholder="Tu email">

<br>

<a href="clases.html">
<button>Ingresar</button>
</a>

</div>

</body>

</html>

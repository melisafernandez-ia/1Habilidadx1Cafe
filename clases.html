<!DOCTYPE html>
<html>

<head>
<title>Biblioteca de Clases</title>

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
text-align:center;
padding:40px;
}

/* PORTADA */
.hero{
margin-bottom:60px;
border-radius:15px;
overflow:hidden;
box-shadow:0 0 30px rgba(0,0,0,0.8);
}
.hero img{
width:100%;
max-height:220px;
object-fit:contain;
display:block;
}

/* CONTENEDOR CLASES */
.contenedor{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:30px;
}

/* TARJETAS */
.clase{
background:#1c1c1c;
width:300px;
padding:25px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,0.6);
transition:transform 0.3s;
}

.clase:hover{
transform:scale(1.05);
}

.clase img{
width:100%;
border-radius:10px;
margin-bottom:10px;
}

/* BOTONES */
button{
padding:12px 25px;
font-size:16px;
background:#ff4b2b;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#ff2a00;
}

/* RESPONSIVE */
@media (max-width:768px){

body{
padding:20px;
}

.clase{
width:90%;
}

}

</style>

</head>

<body>

<!-- PORTADA -->
<div class="hero">
<img src="portada.jpeg" alt="Portada">
</div>

<!-- TITULO -->
<h2>Biblioteca de Clases</h2>

<!-- CLASES -->
<div class="contenedor">

<div class="clase">
<img src="clase1.jpeg">
<h3>Clase 1</h3>
<p>Introducción a IA para docentes</p>
<a href="clase1.html">
<button>Ver clase</button>
</a>
</div>

<div class="clase">
<img src="clase2.jpeg">
<h3>Clase 2</h3>
<p>Crear evaluaciones con IA</p>
<a href="clase2.html">
<button>Ver clase</button>
</a>
</div>

</div>

</body>
</html>

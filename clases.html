<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* -------- FIREBASE -------- */

const firebaseConfig = {

apiKey: "AIzaSyBFJH3LRuaS8yc6iDsXXcwACzpddA8lr5c",
authDomain: "habilidadx1cafe.firebaseapp.com",
projectId: "habilidadx1cafe",
storageBucket: "habilidadx1cafe.firebasestorage.app",
messagingSenderId: "113035104487",
appId: "1:113035104487:web:1427b58f5263136d321242"

};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* -------- API -------- */

const API_URL = "https://script.google.com/macros/s/AKfycbwMYN0wLqtyEtwbC7z-nj414_m4S5vLanYBo52TbjEn4nCiud3dboOAoQ5ix3z7RNF0/exec";

/* -------- VERIFICAR USUARIO -------- */

onAuthStateChanged(auth, async (user)=>{

if(!user){

window.location.href="login.html";
return;

}

/* MOSTRAR EMAIL */

document.getElementById("usuario").innerText =
"Bienvenido: " + user.email;

/* CONSULTAR API */

try{

const res = await fetch(API_URL,{
method:"POST",
body:JSON.stringify({email:user.email})
});

const data = await res.json();

/* SI NO ESTA ACTIVO */

if(data.estado !== "activo"){

alert("Tu membresía no está activa o ya venció.");

signOut(auth);

window.location.href="membresia.html";

}

}

catch(error){

alert("Error verificando membresía");

signOut(auth);

window.location.href="login.html";

}

});

/* -------- LOGOUT -------- */

window.logout = function(){

signOut(auth).then(()=>{

window.location.href="login.html";

});

}

</script>

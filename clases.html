<!DOCTYPE html>
<html>

<head>

<title>Biblioteca de Clases</title>

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
text-align:center;
padding:40px;
}

/* HERO (PORTADA) */
.hero{
background-image:url("portada.jpg");
background-size:cover;
background-position:center;
padding:120px 40px;
border-radius:15px;
margin-bottom:60px;
box-shadow:0 0 30px rgba(0,0,0,0.8);
}

.hero h1{
font-size:60px;
margin-bottom:10px;
}

.hero p{
font-size:22px;
margin-bottom:20px;
}

.hero button{
padding:14px 35px;
font-size:18px;
background:#ff4b2b;
border:none;
border-radius:10px;
cursor:pointer;
color:white;
}

.hero button:hover{
background:#ff2a00;
}

/* CONTENEDOR CLASES */
.contenedor{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:30px;
}

/* TARJETAS */
.clase{
background:#1c1c1c;
width:300px;
padding:25px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,0.6);
transition:transform 0.3s;
}

.clase:hover{
transform:scale(1.05);
}

.clase img{
width:100%;
border-radius:10px;
margin-bottom:10px;
}

/* BOTONES */
button{
padding:12px 25px;
font-size:16px;
background:#ff4b2b;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#ff2a00;
}

</style>

</head>

<body>

<!-- PORTADA -->
<div class="hero">
<h1>☕ 1 Habilidad x 1 Café</h1>
<p>Clases de IA prácticas para docentes — una habilidad por semana.</p>
<a href="#clases">
<button>Explorar clases</button>
</a>
</div>

<!-- TITULO -->
<h2 id="clases">Biblioteca de Clases</h2>

<!-- CLASES -->
<div class="contenedor">

<div class="clase">
<img src="clase1.jpeg">
<h3>Clase 1</h3>
<p>Introducción a IA para docentes</p>
<a href="clase1.html">
<button>Ver clase</button>
</a>
</div>

<div class="clase">
<img src="clase2.jpeg">
<h3>Clase 2</h3>
<p>Crear evaluaciones con IA</p>
<a href="clase2.html">
<button>Ver clase</button>
</a>
</div>

</div>

</body>

</html>

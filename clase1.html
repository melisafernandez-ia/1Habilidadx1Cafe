
<!DOCTYPE html>
<html>

<head>

<title>Clase 1</title>

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
text-align:center;
padding:40px;
}

/* BOTON VOLVER */

.volver{
position:absolute;
top:20px;
left:20px;
}

.volver button{
background:#444;
color:white;
border:none;
padding:10px 18px;
border-radius:6px;
cursor:pointer;
}

.volver button:hover{
background:#666;
}


/* VIDEO */

.video{
position:relative;
width:900px;
max-width:100%;
margin:auto;
overflow:hidden;
border-radius:12px;
margin-top:40px;
}

.video iframe{
width:100%;
height:500px;
border:none;
border-radius:12px;
box-shadow:0 0 25px rgba(0,0,0,0.8);
}

/* TAPA SUPERIOR YOUTUBE */

.video::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:40px;
background:#0f0f0f;
}


/* MATERIALES */

.materiales{
margin-top:40px;
background:#1c1c1c;
padding:30px;
border-radius:12px;
display:inline-block;
}

.materiales h3{
margin-bottom:15px;
}

.materiales a{
display:block;
margin:10px;
font-size:18px;
color:#8ab4f8;
text-decoration:none;
}

.materiales a:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="volver">
<a href="clases.html">
<button>⬅ Volver</button>
</a>
</div>

<h1>Clase 1</h1>
<h2>Introducción a IA para docentes</h2>

<div class="video" id="video"></div>

<div class="materiales">

<h3>Materiales</h3>

<a href="#">Descargar prompts</a>
<a href="#">Descargar ejemplos</a>

</div>


<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getAuth, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


const firebaseConfig = {

apiKey:"AIzaSyBFJH3LRuaS8yc6iDsXXcwACzpddA8lr5c",
authDomain:"habilidadx1cafe.firebaseapp.com",
projectId:"habilidadx1cafe",
storageBucket:"habilidadx1cafe.firebasestorage.app",
messagingSenderId:"113035104487",
appId:"1:113035104487:web:1427b58f5263136d321242"

};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);


/* EVITAR QUE LA PAGINA SE CARGUE DENTRO DE OTRA WEB */

if (window.top !== window.self) {
document.body.innerHTML = "";
}


/* VIDEO ID OFUSCADO */

const v1 = "-qxd";
const v2 = "mDxD";
const v3 = "8TA";

function obtenerVideo(){
return v1 + v2 + v3;
}


/* VERIFICAR USUARIO */

let verificado = false;

onAuthStateChanged(auth, async (user)=>{

if(!user && verificado){

window.location.href="login.html";
return;

}

if(!user){
verificado = true;
return;
}

const email = user.email;


/* BUSCAR EN SHEET */

const url = "https://sheetdb.io/api/v1/i8l8o8fhonpzj/search?email="+email;

const res = await fetch(url);
const data = await res.json();

if(data.length===0){

alert("Tu cuenta aún no está habilitada");

window.location.href="membresia.html";

return;

}


/* GENERAR VIDEO SOLO SI ESTA HABILITADO */

const videoID = obtenerVideo();

document.getElementById("video").innerHTML =
'<iframe src="https://www.youtube-nocookie.com/embed/'+videoID+'?modestbranding=1&rel=0&controls=0&disablekb=1&fs=0&iv_load_policy=3&playsinline=1" allowfullscreen></iframe>';

});


/* BLOQUEAR CLICK DERECHO */

document.addEventListener("contextmenu",function(e){
e.preventDefault();
});


/* BLOQUEAR SELECCION DE TEXTO */

document.addEventListener("selectstart",function(e){
e.preventDefault();
});


/* BLOQUEAR INSPECCION BASICA */

document.addEventListener("keydown", function(e){

if(e.key === "F12"){
e.preventDefault();
}

if(e.ctrlKey && e.shiftKey && e.key === "I"){
e.preventDefault();
}

if(e.ctrlKey && e.key === "U"){
e.preventDefault();
}

});

</script>

</body>
</html>
